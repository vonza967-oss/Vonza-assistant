<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vonza | Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
  <script>
    (() => {
      let theme = "light";
      try {
        theme = window.localStorage?.getItem("vonza_dashboard_theme") === "dark" ? "dark" : "light";
      } catch {}
      document.documentElement.dataset.dashboardTheme = theme;
      try {
        const language = window.localStorage?.getItem("vonza_dashboard_language") === "hu" ? "hu" : "en";
        document.documentElement.dataset.dashboardLanguage = language;
        document.documentElement.lang = language;
      } catch {}
    })();
  </script>
  <link rel="stylesheet" href="/dashboard.css">
  <link rel="stylesheet" href="/settings/settings.css">
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <a class="brand" href="/dashboard" aria-label="Go to dashboard">
        <div class="brand-mark">V</div>
        <div>Vonza</div>
      </a>
      <div id="topbar-meta"></div>
    </div>
    <div id="status-banner" class="status-banner"></div>
    <div id="dashboard-root">
      <section class="dashboard-loading-screen" role="status" aria-live="polite">
        <div class="dashboard-loading-mark" aria-hidden="true">V</div>
        <h1 data-loading-title>Loading your workspace</h1>
        <p data-loading-copy>Getting your customer service dashboard ready.</p>
      </section>
    </div>
  </main>

  <script src="/public-config.js"></script>
  <script src="/supabase-auth.js"></script>
  <script src="/i18n/dashboardI18n.js"></script>
  <script>
    (() => {
      const i18n = window.VonzaDashboardI18n;
      if (!i18n) return;
      const language = i18n.getCachedLanguage();
      document.querySelector("[data-loading-title]").textContent = i18n.t("app.loading.title", {}, language);
      document.querySelector("[data-loading-copy]").textContent = i18n.t("app.loading.copy", {}, language);
    })();
  </script>
  <script src="/settings/SettingsShell.js"></script>
  <script src="/dashboard.js"></script>
</body>
</html>
